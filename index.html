<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | QR code component</title>
  <style>
    *{
      margin: 0;
    }
    body{
      background-color: hsl(212, 45%, 89%);
      font-family: "Outfit", sans-serif;
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
      font-size: 1.05vw;
    }
    .card{
      background-color: white;
      padding: 1vw;
      justify-items: center;
      border-radius: 1vw;
      padding-bottom: 3vw;
      box-shadow: 0 1vw 2vw hsl(216, 15%, 48%);
    }
    .image{
      background-image: url(images/image-qr-code.png);
      width: 20vw;
      aspect-ratio: 1/1;
      background-size: contain;
      border-radius: 0.5vw;
    }
    .petrolho{
      font-weight: 700;
      text-align: center;
      color: hsl(218, 44%, 22%);
      font-size: 1.5vw;
      margin: 1vw 0;
    }
    .petrolho2{
      font-weight: 400;
      text-align: center;
      color: hsl(216, 15%, 48%);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="image"></div>
    <p class="petrolho">Improve your front-end<br>skills by building projects</p>
    <p class="petrolho2">Scan the QR code to visit Frontend<br>Mentor and take your coding skills to<br>the next level</p>
  </div>
</body>
</body>
</html>
